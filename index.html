<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- MOBILE VIEW -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#ff0000,#ff4b5c,#8b0000);
background-size:400% 400%;
animation:bg 12s infinite;
z-index:-2;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* CARD */
.card{
background:rgba(255,0,0,0.25);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
margin:20px 10px;
width:95%;
max-width:420px;
box-shadow:0 0 20px rgba(255,0,0,0.6);
animation:fade .6s;
}
@keyframes fade{
from{opacity:0;transform:scale(.9)}
to{opacity:1}
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:16px;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:25px;
background:#ff1e3c;
color:white;
font-size:16px;
font-weight:bold;
}

/* BACK BUTTON */
.back-btn{
width:auto;
padding:8px 14px;
font-size:14px;
position:absolute;
left:10px;
top:10px;
}

/* SCREENS */
.screen{display:none;}
.active{display:block;}

/* GIFTS */
.gift-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}
.gift{
width:80px;
}
.gift:active{
transform:scale(1.2);
}

/* FLOAT */
.float{
position:fixed;
bottom:-20px;
animation:float 6s linear infinite;
}
@keyframes float{
to{transform:translateY(-900px);opacity:0;}
}

/* QUOTE */
#quote{
position:fixed;
top:10%;
width:100%;
font-size:14px;
padding:0 10px;
}

/* GAME */
#gameArea{
position:relative;
height:250px;
border-radius:15px;
overflow:hidden;
background:rgba(0,0,0,0.2);
}
.loveItem{
position:absolute;
font-size:28px;
cursor:pointer;
}

/* MUSIC */
#musicBtn{
position:fixed;
right:10px;
top:10px;
width:45px;
height:45px;
border-radius:50%;
}

/* IMAGE */
#img{
width:100%;
max-width:250px;
border-radius:15px;
margin-top:10px;
}

</style>
</head>

<body>

<div id="quote"></div>

<button id="musicBtn" onclick="toggleMusic()">▶</button>

<audio id="music" loop>
<source src="your-love-song.mp3">
</audio>

<!-- PASS -->
<div class="screen active" id="pass">
<div class="card">
<h2>Enter Passcode 🔒</h2>
<input id="code" placeholder="Enter code">
<button onclick="check()">Unlock</button>
<p id="err"></p>
</div>
</div>

<!-- READY -->
<div class="screen" id="ready">
<button class="back-btn" onclick="back()">⬅</button>
<div class="card">
<h2>Ready? ❤️</h2>
<button onclick="start()">YES 😍</button>
</div>
</div>

<!-- GIFTS -->
<div class="screen" id="gift">
<button class="back-btn" onclick="back()">⬅</button>
<div class="card">
<h2>Pick a gift 🎁</h2>

<div class="gift-container">

<img class="gift" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
onclick="openGift('img1.jpg','You are my forever ❤️','You are my today and tomorrow ❤️')">

<img class="gift" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
onclick="openGift('img3.jpg','Magic 💕','Every moment with you is magic 💖')">

<img class="gift" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
onclick="openGift('img4.jpg','Only you 😘','You are my forever ❤️')">

</div>

<button onclick="next('game')">🎮 Play Love Game</button>

</div>
</div>

<!-- FINAL -->
<div class="screen" id="final">
<button class="back-btn" onclick="back()">⬅</button>
<div class="card">
<h2>I love you ❤️</h2>
<button onclick="next('letter')">💌 Letter</button>
<img id="img">
<p id="q"></p>
</div>
</div>

<!-- LETTER -->
<div class="screen" id="letter">
<button class="back-btn" onclick="back()">⬅</button>
<div class="card">
<h2>My Love 💖</h2>
<p id="letterText"></p>
</div>
</div>

<!-- GAME -->
<div class="screen" id="game">
<button class="back-btn" onclick="back()">⬅</button>
<div class="card">
<h2>Catch My Love ❤️</h2>
<p>Score: <span id="score">0</span></p>

<div id="gameArea"></div>

<button onclick="startGame()">Start Game</button>
</div>
</div>

<script>

let stack=[];

/* QUOTES */
const quotes=[
"Love is composed of a single soul inhabiting two bodies ❤️",
"I love you more every day 💕",
"You are my everything 💖",
"Forever with you ❤️"
];
let qi=0;
setInterval(()=>{
document.getElementById("quote").innerText=quotes[qi];
qi=(qi+1)%quotes.length;
},3000);

/* NAVIGATION */
function next(id){
let c=document.querySelector('.active');
stack.push(c.id);
c.classList.remove('active');
document.getElementById(id).classList.add('active');
}
function back(){
if(stack.length){
let p=stack.pop();
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(p).classList.add('active');
}
}

/* PASSCODE */
function check(){
if(document.getElementById("code").value=="122006")
next('ready');
else document.getElementById("err").innerText="Wrong!";
}

/* START */
function start(){
toggleMusic();
floating();
next('gift');
}

/* MUSIC */
function toggleMusic(){
let m=document.getElementById("music");
let b=document.getElementById("musicBtn");
if(m.paused){m.play();b.innerText="⏸";}
else{m.pause();b.innerText="▶";}
}

/* FLOATING EFFECT */
function floating(){
setInterval(()=>{
let e=document.createElement("div");
e.className="float";
e.innerHTML=Math.random()>0.5?"❤️":"✨";
e.style.left=Math.random()*100+"vw";
document.body.appendChild(e);
setTimeout(()=>e.remove(),6000);
},250);
}

/* GIFT */
function openGift(img,quote,letter){
document.getElementById("img").src=img;
document.getElementById("q").innerText=quote;
document.getElementById("letterText").innerText=letter;
next('final');
}

/* GAME */
let score=0;
let gameRunning=false;

function startGame(){
if(gameRunning) return;
gameRunning=true;

score=0;
document.getElementById("score").innerText=score;
let area=document.getElementById("gameArea");
area.innerHTML="";

setInterval(()=>{
let item=document.createElement("div");
item.className="loveItem";
item.innerHTML="❤️";
item.style.left=Math.random()*85+"%";
item.style.top="0px";

item.onclick=()=>{
score++;
document.getElementById("score").innerText=score;
item.remove();
};

area.appendChild(item);

let fall=setInterval(()=>{
let top=parseInt(item.style.top);
item.style.top=(top+6)+"px";
if(top>220){
item.remove();
clearInterval(fall);
}
},50);

},900);
}

</script>

</body>
</html>

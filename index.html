<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
}

/* BACKGROUND */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#ff0000,#ff4b5c,#8b0000);
background-size:400% 400%;
animation:bg 12s infinite;
z-index:-2;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* APP CONTAINER */
.app{
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.icon-btn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:18px;
}

/* CONTENT */
.content{
flex:1;
overflow-y:auto;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,0,0,0.25);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
max-width:420px;
margin:auto;
box-shadow:0 0 20px rgba(255,0,0,0.6);
animation:fade .5s;
}
@keyframes fade{
from{opacity:0;transform:scale(.9)}
to{opacity:1}
}

/* INPUT */
input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:16px;
margin-top:10px;
}

/* BUTTON */
button.main{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:25px;
background:#ff1e3c;
color:white;
font-size:16px;
font-weight:bold;
}

/* SCREENS */
.screen{display:none;}
.active{display:block;}

/* GIFTS */
.gift-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:15px;
}
.gift{
width:85px;
}
.gift:active{
transform:scale(1.2);
}

/* IMAGE */
#img{
width:100%;
max-width:260px;
border-radius:15px;
margin-top:10px;
}

/* QUOTE */
#quote{
text-align:center;
font-size:14px;
margin-bottom:10px;
}

/* GAME */
#gameArea{
position:relative;
height:250px;
border-radius:15px;
overflow:hidden;
background:rgba(0,0,0,0.2);
margin-top:10px;
}
.loveItem{
position:absolute;
font-size:28px;
}

/* BOTTOM NAV */
.bottom-nav{
display:flex;
justify-content:space-around;
padding:10px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.nav-btn{
border:none;
background:none;
color:white;
font-size:18px;
}

</style>
</head>

<body>

<div class="app">

<!-- TOP BAR -->
<div class="topbar">
<button class="icon-btn" onclick="back()">←</button>
<div>❤️ For You</div>
<button class="icon-btn" id="musicBtn" onclick="toggleMusic()">▶</button>
</div>

<!-- CONTENT -->
<div class="content">

<div id="quote"></div>

<!-- PASS -->
<div class="screen active" id="pass">
<div class="card">
<h2>Enter Passcode 🔒</h2>
<input id="code" placeholder="Enter code">
<button class="main" onclick="check()">Unlock</button>
<p id="err"></p>
</div>
</div>

<!-- READY -->
<div class="screen" id="ready">
<div class="card">
<h2>Ready? ❤️</h2>
<button class="main" onclick="start()">YES 😍</button>
</div>
</div>

<!-- GIFTS -->
<div class="screen" id="gift">
<div class="card">
<h2>Pick a gift 🎁</h2>

<div class="gift-container">
<img class="gift" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
onclick="openGift('img1.jpg','You are my forever ❤️','You are my today and tomorrow ❤️')">

<img class="gift" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
onclick="openGift('img3.jpg','Magic 💕','Every moment with you is magic 💖')">

<img class="gift" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png"
onclick="openGift('img4.jpg','Only you 😘','You are my forever ❤️')">
</div>

<button class="main" onclick="next('game')">🎮 Play Love Game</button>

</div>
</div>

<!-- FINAL -->
<div class="screen" id="final">
<div class="card">
<h2>I love you ❤️</h2>
<button class="main" onclick="next('letter')">💌 Letter</button>
<img id="img">
<p id="q"></p>
</div>
</div>

<!-- LETTER -->
<div class="screen" id="letter">
<div class="card">
<h2>My Love 💖</h2>
<p id="letterText"></p>
</div>
</div>

<!-- GAME -->
<div class="screen" id="game">
<div class="card">
<h2>Catch My Love ❤️</h2>
<p>Score: <span id="score">0</span></p>

<div id="gameArea"></div>

<button class="main" onclick="startGame()">Start Game</button>
</div>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
<button class="nav-btn" onclick="next('gift')">🎁</button>
<button class="nav-btn" onclick="next('game')">🎮</button>
<button class="nav-btn" onclick="next('letter')">💌</button>
</div>

</div>

<audio id="music" loop>
<source src="your-love-song.mp3.mp3">
</audio>

<script>

let stack=[];

/* QUOTES */
const quotes=[
"Love is composed of a single soul inhabiting two bodies ❤️",
"I love you more every day 💕",
"You are my everything 💖",
"Forever with you ❤️"
];
let qi=0;
setInterval(()=>{
document.getElementById("quote").innerText=quotes[qi];
qi=(qi+1)%quotes.length;
},3000);

/* NAV */
function next(id){
let c=document.querySelector('.active');
if(c) stack.push(c.id);
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function back(){
if(stack.length){
let p=stack.pop();
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(p).classList.add('active');
}
}

/* PASS */
function check(){
if(document.getElementById("code").value=="122006")
next('ready');
else document.getElementById("err").innerText="Wrong!";
}

/* START */
function start(){
toggleMusic();
floating();
next('gift');
}

/* MUSIC */
function toggleMusic(){
let m=document.getElementById("music");
let b=document.getElementById("musicBtn");
if(m.paused){m.play();b.innerText="⏸";}
else{m.pause();b.innerText="▶";}
}

/* FLOAT */
function floating(){
setInterval(()=>{
let e=document.createElement("div");
e.style.position="fixed";
e.style.bottom="-20px";
e.innerHTML=Math.random()>0.5?"❤️":"✨";
e.style.left=Math.random()*100+"vw";
document.body.appendChild(e);
setTimeout(()=>e.remove(),6000);
},250);
}

/* GIFT */
function openGift(img,quote,letter){
document.getElementById("img").src=img;
document.getElementById("q").innerText=quote;
document.getElementById("letterText").innerText=letter;
next('final');
}

/* GAME */
let score=0;
let running=false;

function startGame(){
if(running) return;
running=true;

score=0;
document.getElementById("score").innerText=score;
let area=document.getElementById("gameArea");
area.innerHTML="";

setInterval(()=>{
let item=document.createElement("div");
item.className="loveItem";
item.innerHTML="❤️";
item.style.left=Math.random()*85+"%";
item.style.top="0px";

item.onclick=()=>{
score++;
document.getElementById("score").innerText=score;
item.remove();
};

area.appendChild(item);

let fall=setInterval(()=>{
let top=parseInt(item.style.top);
item.style.top=(top+6)+"px";
if(top>220){
item.remove();
clearInterval(fall);
}
},50);

},900);
}

</script>

</body>
</html>
